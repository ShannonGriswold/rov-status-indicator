# https://results.pre-commit.ci/repo/github/821875747
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.14
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
        pass_filenames: false
      # Run the formatter.
      - id: ruff-format
        exclude: src/surface/photosphere/photosphere/projection_matrix/.*
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: ["-style=file"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports, --explicit-package-bases, --no-warn-unused-ignores, --allow-untyped-decorators, --allow-subclassing-any, --allow-untyped-call]
        additional_dependencies:
          - types-requests
          - PyQt6-stubs
          - opencv-stubs
          - numpy
          - types-paramiko
          - types-PyYAML
